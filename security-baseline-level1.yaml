AWSTemplateFormatVersion: "2010-09-09"
Description: Level 1 Security Baseline - IAM Roles and Secrets Management

Parameters:
  FullName:
    Type: String
    Description: full name for resource naming (NO SPACES, e.g., TimothyNlenjibi)

Resources:

# =========================
# 🔐 EC2 ROLE
# =========================

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FullName}_ec2_role"
      Description: EC2 role with S3 read access
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

# =========================
# ⚙️ LAMBDA ROLE
# =========================

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FullName}_lambda_role"
      Description: Lambda role with S3 read access
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

# =========================
# 🐳 ECS ROLE
# =========================

  ECSRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FullName}_ecs_role"
      Description: ECS task role with S3 read access
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

# =========================
# 🔑 KMS KEY
# =========================

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Key for encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

# =========================
# 📦 PARAMETER STORE
# =========================

  SecureParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${FullName}/week2lab/parameter_name"  
      Type: SecureString
      Value: "productionDatabaseKey329384"
      KeyId: alias/aws/ssm   
      Description: Secure parameter for Week 2 lab

# =========================
# 🔒 SECRETS MANAGER
# =========================

  Secret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/${FullName}/week2lab/secret_name"
      Description: Secret for Week 2 lab
      KmsKeyId: !GetAtt KMSKey.Arn    
      SecretString: |
        {
          "MyPassword": "SuperSecurePassword123"
        }

# =========================
# 📤 OUTPUTS
# =========================

Outputs:
  EC2RoleName:
    Value: !Ref EC2Role

  LambdaRoleName:
    Value: !Ref LambdaRole

  ECSRoleName:
    Value: !Ref ECSRole

  ParameterName:
    Value: !Ref SecureParameter

  SecretName:
    Value: !Ref Secret