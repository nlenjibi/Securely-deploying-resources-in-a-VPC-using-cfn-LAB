
AWSTemplateFormatVersion: "2010-09-09"
Description: Level 1 Security Baseline - IAM Roles and Secrets Management

Parameters:
  FullName:
    Type: String
    Description: Your full name (used for naming resources)

Resources:

# =========================
# 🔐 IAM ROLES
# =========================

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FullName}_ec2_role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FullName}_lambda_role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ECSRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FullName}_ecs_role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

# =========================
# 🔑 KMS KEY
# =========================

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Encryption key for Parameter Store
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action: "kms:*"
            Resource: "*"

# =========================
# 📦 PARAMETER STORE
# =========================

  SecureParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${FullName}/week2lab/parameter_name/"
      Type: SecureString
      Value: "productionDatabaseKey329384"
      KeyId: !Ref KMSKey

# =========================
# 🔒 SECRETS MANAGER
# =========================

  Secret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/${FullName}/week2lab/secret_name"
      Description: Sample secret
      SecretString: |
        {
          "MyPassword": "SuperSecurePassword123"
        }

Outputs:
  EC2RoleName:
    Value: !Ref EC2Role

  LambdaRoleName:
    Value: !Ref LambdaRole

  ECSRoleName:
    Value: !Ref ECSRole

  ParameterName:
    Value: !Ref SecureParameter

  SecretName:
    Value: !Ref Secret